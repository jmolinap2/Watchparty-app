events {}

http {
    # Required for SignalR WebSocket upgrades.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    upstream watchparty_api {
        server api:8080;
    }
    upstream watchparty_web {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # Large enough for SignalR negotiate/long-polling.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # REST API.
        location /api/ {
            proxy_pass http://watchparty_api;
        }

        # Health checks.
        location /health {
            proxy_pass http://watchparty_api;
        }

        # SignalR hub (WebSockets).
        location /hubs/ {
            proxy_pass http://watchparty_api;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # OpenAPI / Swagger (dev convenience).
        location /swagger/ {
            proxy_pass http://watchparty_api;
        }

        # Everything else → Next.js web client.
        location / {
            proxy_pass http://watchparty_web;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
