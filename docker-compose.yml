# Local/staging orchestration for WatchParty.
#
# Everything is reachable through nginx on http://localhost:8080
#   /            -> web (Next.js)
#   /api, /hubs  -> api (ASP.NET Core)
#
# The API auto-migrates and seeds on startup (admin user + allowed media hosts).
# Override secrets via a .env file next to this one (see .env.example).

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchparty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchparty}
      POSTGRES_DB: ${POSTGRES_DB:-watchparty}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchparty}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-watchparty};Username=${POSTGRES_USER:-watchparty};Password=${POSTGRES_PASSWORD:-watchparty}"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Issuer: "watchparty"
      Jwt__Audience: "watchparty.clients"
      Jwt__Key: ${JWT_KEY:-CHANGE_ME_USE_A_32_BYTE_MINIMUM_SECRET}
      Jwt__AccessTokenMinutes: "15"
      Database__AutoMigrate: "true"
      Cors__AllowedOrigins__0: ${PUBLIC_ORIGIN:-http://localhost:8080}
      Cors__AllowedOrigins__1: "http://localhost:3000"
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-admin@watchparty.local}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      Seed__AdminDisplayName: "Administrator"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
